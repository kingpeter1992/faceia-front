<div class="success-container">
  <div class="success-card shadow-lg">

    <!-- Icône Animée de Validation -->
    <div class="icon-circle">
      <span class="checkmark">✨</span>
    </div>

    <h2 class="success-title">Rapport Transmis !</h2>
    <p class="success-message">
      Le comptage du protocole a été enregistré avec succès dans la base de données de l'administration.
    </p>

    <!-- Petit récapitulatif visuel -->
    <div class="info-badge">
      <span>🔒 Lien à usage unique désormais révoqué</span>
    </div>

    <div class="action-zone">
      <p class="thank-you">Merci pour votre service ! 🙏</p>
      <button type="button" class="btn-close-session" (click)="fermer()">
        Quitter la session
      </button>
    </div>

  </div>
</div>
